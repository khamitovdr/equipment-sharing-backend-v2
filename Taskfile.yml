version: "3"

vars:
  IMAGE_NAME: rental-platform
  VERSION: dev

tasks:
  # ── Setup ──────────────────────────────────────────────
  setup:
    desc: Install deps, start infra
    cmds:
      - poetry install
      - task: infra:up
      - task: test:up

  # ── Dev Infrastructure ────────────────────────────────
  infra:up:
    desc: Start dev infrastructure (DB, OTel Collector, ClickHouse, Grafana)
    cmds:
      - docker compose -p rental-dev -f docker-compose.dev.yml up -d

  infra:down:
    desc: Stop dev infrastructure
    cmds:
      - docker compose -p rental-dev -f docker-compose.dev.yml down

  infra:reset:
    desc: Stop dev infrastructure and remove volumes
    cmds:
      - docker compose -p rental-dev -f docker-compose.dev.yml down -v

  # ── Test Infrastructure ───────────────────────────────
  test:up:
    desc: Start test infrastructure (DB on port 5433)
    cmds:
      - docker compose -p rental-test -f docker-compose.test.yml up -d

  test:down:
    desc: Stop test infrastructure
    cmds:
      - docker compose -p rental-test -f docker-compose.test.yml down

  test:reset:
    desc: Stop test infrastructure and remove volumes
    cmds:
      - docker compose -p rental-test -f docker-compose.test.yml down -v

  # ── Run ────────────────────────────────────────────────
  run:
    desc: Start the dev server
    cmds:
      - poetry run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000 {{.CLI_ARGS}}

  # ── Lint & Format ──────────────────────────────────────
  lint:
    desc: Check linting (no auto-fix)
    cmds:
      - poetry run ruff check . {{.CLI_ARGS}}
      - poetry run ruff format --check . {{.CLI_ARGS}}

  lint:fix:
    desc: Auto-fix lint errors and format
    cmds:
      - poetry run ruff check --fix . {{.CLI_ARGS}}
      - poetry run ruff format . {{.CLI_ARGS}}

  # ── Type checking ──────────────────────────────────────
  typecheck:
    desc: Run mypy strict
    cmds:
      - poetry run mypy . {{.CLI_ARGS}}

  # ── Testing ────────────────────────────────────────────
  test:
    desc: Run full test suite
    deps: [test:up]
    cmds:
      - poetry run pytest {{.CLI_ARGS}}

  test:cov:
    desc: Run tests with coverage report
    deps: [test:up]
    cmds:
      - poetry run pytest --cov=app --cov-report=html --cov-report=term {{.CLI_ARGS}}

  test:lf:
    desc: Re-run last failed tests
    deps: [test:up]
    cmds:
      - poetry run pytest --lf {{.CLI_ARGS}}

  # ── Database migrations ────────────────────────────────
  db:init:
    desc: Create migration packages (first-time setup)
    cmds:
      - poetry run tortoise init

  db:makemigrations:
    desc: Detect model changes and generate migrations
    cmds:
      - poetry run tortoise makemigrations {{.CLI_ARGS}}

  db:migrate:
    desc: Apply pending migrations
    cmds:
      - poetry run tortoise migrate {{.CLI_ARGS}}

  # ── Build & Deploy ─────────────────────────────────────
  build:
    desc: Build production Docker image (pass VERSION=x.y.z)
    cmds:
      - docker build -t {{.IMAGE_NAME}}:{{.VERSION}} --build-arg APP_VERSION={{.VERSION}} .
      - docker tag {{.IMAGE_NAME}}:{{.VERSION}} {{.IMAGE_NAME}}:latest

  deploy:
    desc: Deploy to production (pass VERSION=x.y.z)
    cmds:
      - task: build
      - docker compose -f docker-compose.prod.yml up -d

  # ── CI (all checks) ───────────────────────────────────
  ci:
    desc: Run all checks (lint + typecheck + test)
    cmds:
      - task: lint
      - task: typecheck
      - task: test
