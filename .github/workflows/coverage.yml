name: tests

on:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
          POSTGRES_DB: rental_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U rental -d rental_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      APP_ENV: test
    steps:
      - uses: actions/checkout@v5
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests with coverage
        run: poetry run pytest --cov=app --cov-report=term --cov-report=lcov
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
