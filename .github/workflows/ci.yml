name: ci

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format
        run: poetry run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: mypy
        run: poetry run mypy .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
          POSTGRES_DB: rental_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U rental -d rental_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9002:9000
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      APP_ENV: test
    steps:
      - uses: actions/checkout@v5
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests
        run: poetry run pytest
