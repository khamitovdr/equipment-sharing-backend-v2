repos:
  - repo: local
    hooks:
      - id: lint-fix
        name: ruff lint + format
        entry: task lint:fix
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: task typecheck
        language: system
        types: [python]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-on-push
        name: pytest (pre-push)
        entry: task test
        language: system
        stages: [pre-push]
        pass_filenames: false
